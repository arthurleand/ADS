<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" href="login.css" media="screen" />
</head>
<body class="d-flex aling-items-center py-4 bg-body-tertiary">
        <main class="w-100 m-auto form-container">
            <form>
                <img src="https://aluno.uninassau.edu.br/Aluno/img/uninassau3.svg?27502" alt="Logo uninassau">
                <h1 class="h3 mb-3 fw-normal text-center">Login</h1>
                <div class="form-floating">
                    <input type="text" class="form-control" id="floatingInput" placeholder="Sua Matrícula">
                    <label for="floatingInput">Matrícula</label>
                </div>
                <div class="form-floating">
                    <input type="password" class="form-control" id="floatingInputSenha" placeholder="Sua senha">
                    <label for="floatingInputSenha">Senha</label>
                </div>
                <div class="text-center my-2" id="minhaDiv" style="display: none; color: red;">Usuário ou senha incorreto!!</div>
                <div class="form-check text-start my-3">
                    <input type="checkbox" class="form-check-input" id="flexCheckDefault">
                    <label class="form-check-label" for="flexCheckDefault">Mantenha me conectado</label>
                </div>
                <button class="btn btn-info w-100 py-2" type="button" onclick="logar('minhaDiv')"; return false>Entrar</button>
            </form>
        </main>
    <script src="login.js"></script>
    </div>
</body>
</html>
